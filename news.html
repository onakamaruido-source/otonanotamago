<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニュース | 大人のたまご 🐣</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">


<div class="logo">
    🐣 大人のたまご
</div>

<nav class="nav">
    <a href="index.html">ホーム</a>
    <a href="member.html">マイページ</a>
</nav>


</header>

<main class="container">


<h1>最新ニュース</h1>

<div id="newsContainer">

    <div class="card">
        読み込み中...
    </div>

</div>


</main>

<script src="main.js"></script>

<script>

loadNews();

async function loadNews(){

    const container =
    document.getElementById(
    "newsContainer"
    );

    try{

        const response =
        await fetch(
            GAS_URL +
            "?action=newsList"
        );

        const result =
        await response.json();

        if(
            !result.success
        ){

            container.innerHTML =
            "<div class='card'>ニュース取得失敗</div>";

            return;

        }

        let html = "";

        result.news.forEach(news => {

            html += `
            <div class="card news-card">

                ${
                    news.image
                    ?
                    `<img src="${news.image}" class="news-image">`
                    :
                    ""
                }

                <span class="category">
                    ${news.category}
                </span>

                <h2>
                    ${news.title}
                </h2>

                <p>
                    ${
                        news.content.length > 80
                        ?
                        news.content.substring(0,80) + "..."
                        :
                        news.content
                    }
                </p>

                <a
                class="btn"
                href="news-detail.html?id=${news.id}">
                詳細を見る
                </a>

            </div>
            `;

        });

        if(
            result.news.length === 0
        ){

            html =
            "<div class='card'>ニュースはまだありません。</div>";

        }

        container.innerHTML =
        html;

    }catch(error){

        container.innerHTML =
        "<div class='card'>エラーが発生しました。</div>";

        console.error(error);

    }

}

</script>

</body>
</html>
