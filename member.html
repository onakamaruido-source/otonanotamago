<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>マイページ | 大人のたまご 🐣</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">


<div class="logo">
    🐣 大人のたまご
</div>

<nav class="nav">
    <a href="index.html">ホーム</a>
    <a href="news.html">ニュース</a>
</nav>


</header>

<main class="container">


<div class="card">

    <h1>
        ようこそ！
    </h1>

    <h2 id="userName">
        読み込み中...
    </h2>

    <p id="userEmail">
    </p>

    <p id="userRole">
    </p>

</div>

<div class="card">

    <h2>
        会員メニュー
    </h2>

    <a
        href="news.html"
        class="btn"
    >
        ニュースを見る
    </a>

    <button
        id="adminBtn"
        class="btn"
        style="display:none;"
        onclick="location.href='admin.html'"
    >
        管理画面
    </button>

    <button
        class="btn logout-btn"
        onclick="logout()"
    >
        ログアウト
    </button>

</div>


</main>

<script>

const user =
JSON.parse(
localStorage.getItem("user")
);

if(!user){

    location.href =
    "login.html";

}

document.getElementById(
"userName"
).textContent =
user.name + " さん";

document.getElementById(
"userEmail"
).textContent =
"メール: " + user.email;

document.getElementById(
"userRole"
).textContent =
"権限: " + user.role;

if(
user.role === "admin"
){

    document.getElementById(
    "adminBtn"
    ).style.display =
    "inline-block";

}

function logout(){

    localStorage.removeItem(
    "user"
    );

    location.href =
    "index.html";

}

</script>

</body>
</html>
